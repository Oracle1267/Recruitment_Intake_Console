services:
  - type: web
    name: rushintel-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: rushintel-db
          property: connectionString
      - key: RUSHINTEL_API_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: https://recruitment.threadandsignal.org

  - type: web
    name: rushintel-web
    runtime: node
    rootDir: frontend
    buildCommand: npm ci && npm run build
    startCommand: npm run start -- --hostname 0.0.0.0 --port $PORT
    envVars:
      - key: RUSHINTEL_API_BASE_URL
        fromService:
          type: web
          name: rushintel-api
          property: hostport
      - key: RUSHINTEL_API_KEY
        fromService:
          type: web
          name: rushintel-api
          envVarKey: RUSHINTEL_API_KEY
      - key: RUSHINTEL_APP_PASSWORD
        sync: false
      - key: RUSHINTEL_SESSION_SECRET
        generateValue: true

databases:
  - name: rushintel-db
    databaseName: rushintel
    user: rushintel
