services:
  - type: web
    name: rush-tracker-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: rush-tracker-db
          property: connectionString
      - key: RUSH_TRACKER_API_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: https://recruitment.threadandsignal.org

  - type: web
    name: rush-tracker-web
    runtime: node
    plan: free
    rootDir: frontend
    buildCommand: npm ci && npm run build
    startCommand: npm run start -- --hostname 0.0.0.0 --port $PORT
    envVars:
      - key: RUSH_TRACKER_API_BASE_URL
        fromService:
          type: web
          name: rush-tracker-api
          property: hostport
      - key: RUSH_TRACKER_API_KEY
        fromService:
          type: web
          name: rush-tracker-api
          envVarKey: RUSH_TRACKER_API_KEY
      - key: RUSH_TRACKER_APP_PASSWORD
        sync: false
      - key: RUSH_TRACKER_SESSION_SECRET
        generateValue: true

databases:
  - name: rush-tracker-db
    plan: basic-256mb
    databaseName: rushtracker
    user: rushtracker
